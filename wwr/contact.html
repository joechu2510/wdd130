<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us and the rafting company name.</title>
    <meta name="description"
      content="This is a page for a user can add information in a form in order to get the contact information">
    <meta name="author" content="Joe Chu">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo_main.png" alt="main logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact_info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street<br>
                Kolob California<br>
                +1 999 999 9999<br>
                info@whitewater.com</p>
        </div>
        <div class="form-container">
            <div class="map">
                <iframe
                  src="//www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7801.368297086357!2d-76.8367857192666!3d-12.133750075330257!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x910595591b8f42e9%3A0x3b97c22d8f6279e4!2sRio%20Lurin!5e0!3m2!1ses!2spe!4v1775424596448!5m2!1ses!2spe"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade" frameborder="0"></iframe>
            </div>
            <form>
                <div class="quiz_item">
                    <label for="username">Name</label>
                    <input type="text" id="username" name="username" placeholder="Placeholder">
                </div>
                <div class="quiz_item">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="placeholder">
                </div>
                <div class="quiz_item">
                    <label for="radio-group">Message Purpose</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" id="gen" name="purpose"><label for="gen">General
                                Inquiry</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="res" name="purpose"><label for="res">Reservation
                                Question</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" id="web" name="purpose"><label for="web">Website
                                Suggestion</label>
                        </div>
                    </div>
                </div>
                <div class="quiz_item">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="3"
                      placeholder="Type here"></textarea>
                </div>
                <div class="quiz_item">
                    <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                    <input type="checkbox" id="subscribe" name="subscribe">
                </div>
                <button type="submit">Get in Touch!</button>

            </form>
        </div>
        <div class="employee_profile">
            <h2>We Are Here to Serve You</h2>
            <div class="employee_grid">
                <div class="employee_card">
                    <img src="images/employee1.jpg" alt="Profile 1">
                    <p>Employee Profile 1</p>
                </div>
                <div class="employee_card">
                    <img src="images/employee2.jpg" alt="Profile 2">
                    <p>Employee Profile 2</p>
                </div>
                <div class="employee_card">
                    <img src="images/employee3.jpg" alt="Profile 3">
                    <p>Employee Profile 3</p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>©2026, Down the River, Joe Chu</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com">
                <img src="images/facebook_logo.png" alt="facebook_logo">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/instagram_logo.png" alt="instagram_logo">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin_logo.png" alt="linkedin_logo">
            </a>
        </nav>
    </footer>
</body>

</html>
